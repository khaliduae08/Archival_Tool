{% extends "archival/base.html" %}

{% block content %}
<h2 class="h4 mb-3">Database Connections</h2>
<form method="post">
    {% csrf_token %}
    <div class="row">
        <div class="col-md-6">
            <h5>Source Database</h5>
            <div class="mb-3">
                <label>Server</label>
                <input type="text" name="source_server" class="form-control" value="{{ source.server|default:'' }}">
            </div>
            <div class="mb-3">
                <label>Database</label>
                <input type="text" name="source_database" class="form-control" value="{{ source.database|default:'' }}">
            </div>
            <div class="mb-3">
                <label>Username</label>
                <input type="text" name="source_username" class="form-control" value="{{ source.username|default:'' }}">
            </div>
            <div class="mb-3">
                <label>Password</label>
                <input type="password" name="source_password" class="form-control" value="{{ source.password|default:'' }}">
            </div>            
        </div>
        <div class="col-md-6">
            <h5>Destination Database</h5>
            <div class="mb-3">
                <label>Server</label>
                <input type="text" name="dest_server" class="form-control" value="{{ dest.server|default:'' }}">
            </div>
            <div class="mb-3">
                <label>Database</label>
                <input type="text" name="dest_database" class="form-control" value="{{ dest.database|default:'' }}">
            </div>
            <div class="mb-3">
                <label>Username</label>
                <input type="text" name="dest_username" class="form-control" value="{{ dest.username|default:'' }}">
            </div>
            <div class="mb-3">
                <label>Password</label>
                <input type="password" name="dest_password" class="form-control" value="{{ dest.password|default:'' }}">
            </div>
        </div>
    </div>
    <button type="submit" class="btn btn-primary">Save Connections</button>
    <a href="{% url 'home' %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
