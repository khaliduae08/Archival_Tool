{% extends "archival/base.html" %}

{% block content %}
<h2>{{ action }} Application</h2>
<form method="post">
    {% csrf_token %}
    <div class="mb-3">
        <label>Application Name</label>
        <input type="text" name="name" class="form-control" value="{{ app.name|default:'' }}" required>
    </div>
    <div class="mb-3">
        <label>Source Connection</label>
        <select name="src_conn" class="form-select">
            <option value="">-- Select --</option>
            {% for conn in sources %}
                <option value="{{ conn.id }}" {% if app and app.src_conn.id == conn.id %}selected{% endif %}>{{ conn }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="mb-3">
        <label>Destination Connection</label>
        <select name="dstn_conn" class="form-select">
            <option value="">-- Select --</option>
            {% for conn in dests %}
                <option value="{{ conn.id }}" {% if app and app.dstn_conn.id == conn.id %}selected{% endif %}>{{ conn }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="mb-3">
        <label>Archival Cut off Date</label>
        <input type="date" name="max_date" class="form-control" value="{{ app.max_date|default:'' }}">
    </div>

    <button type="submit" class="btn btn-primary">Save</button>
    <a href="{% url 'application_list' %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
