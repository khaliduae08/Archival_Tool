{% extends "archival/base.html" %}

{% block content %}
<h2 class="h4 mb-3">Manage Modules</h2>
<a href="{% url 'module_add' app.id %}" class="btn btn-success mb-3">Add New Module</a>
<table class="table table-bordered">
    <thead>
        <tr>
            <th>Name</th>
            <th>Last Archival</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for module in modules %}
        <tr>
            <td>{{ module.name }}</td>
            <td>{{ module.last_archival_date|default:"Never" }}</td>
            <td>
                <a href="{% url 'table_list' module.id %}" class="btn btn-sm btn-info">Tables</a>
                <a href="{% url 'module_edit' app.id module.id %}" class="btn btn-sm btn-warning">Edit</a>
                <a href="{% url 'module_delete' app.id module.id %}" class="btn btn-sm btn-danger" onclick="return confirm('Delete this module?')">Delete</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
