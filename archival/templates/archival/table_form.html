{% extends "archival/base.html" %}

{% block content %}
<h2 class="h4 mb-3">{{ action }} Table for Module: {{ module.name }}</h2>
<form method="post">
    {% csrf_token %}
    <div class="mb-3">
        <label>Table Name</label>
        <input type="text" name="table_name" class="form-control" value="{{ table.table_name|default:'' }}" required>
    </div>
    <div class="mb-3">
        <label>Sequence (execution order)</label>
        <input type="number" name="sequence" class="form-control" value="{{ table.sequence|default:0 }}" required>
    </div>
    <div class="mb-3">
        <label>Select Script (SQL)</label>
        <textarea name="select_script" class="form-control" rows="5" required>{{ table.select_script|default:'' }}</textarea>
    </div>
    <div class="mb-3">
        <label>Insert Script (SQL)</label>
        <textarea name="insert_script" class="form-control" rows="5" required>{{ table.insert_script|default:'' }}</textarea>
    </div>
    <div class="mb-3">
        <label>Delete Script (SQL)</label>
        <textarea name="delete_script" class="form-control" rows="5" >{{ table.delete_script|default:'' }}</textarea>
    </div>
    <div class="mb-3">
        <label>Account Summary</label>
        <select name="acct_sum" class="form-control" required>
            <option value="Y" {% if table.acct_sum == 'Y' %}selected{% endif %}>Yes</option>
            <option value="N" {% if table.acct_sum == 'N' %}selected{% endif %}>No</option>
        </select>
    </div>
    <div class="mb-3 form-check">
        <input type="checkbox" name="identity_insert" class="form-check-input" id="identityInsertCheck" {% if table.identity_insert %}checked{% endif %}>
        <label class="form-check-label" for="identityInsertCheck">Enable Identity Insert</label>
    </div>
    <button type="submit" class="btn btn-primary">Save</button>
    <a href="{% url 'table_list' module.id %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
