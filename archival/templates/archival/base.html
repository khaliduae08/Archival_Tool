{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mfloos Data LifeCycle Tool</title>
    <link href="{% static 'archival/css/bootstrap.min.css' %}" rel="stylesheet">
    <script src="{% static 'archival/js/jquery.min.js' %}"></script> 
    <style>
        .dashboard-header {
            background-color: #f8f9fc;
            padding: 20px;
            border-bottom: 1px solid #e3e6f0;
        }
        .stat-card {
            background: white;
            border-left: 4px solid #4e73df;
            border-radius: 0.35rem;
            box-shadow: 0 0.15rem 1.75rem 0 rgba(58,59,69,0.15);
            padding: 1rem;
            margin-bottom: 1rem;
        }
        .menu-item {
            padding: 0.5rem 1rem;
            font-weight: 500;
            color: #3a3b45;
            text-decoration: none;
            display: block;
        }
        .menu-item:hover {
            background-color: #eaecf4;
            border-radius: 0.35rem;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-12">
                <div class="dashboard-header d-flex justify-content-between align-items-center">
                    <h1 class="h3 mb-0 text-gray-800">Mfloos Data LifeCycle Tool</h1>
                    <a href="{% url 'home' %}" class="btn btn-sm btn-outline-primary">Home</a>
                    <div class="search-box">
                        <input type="text" class="form-control" placeholder="Search menu name...">
                    </div>
                </div>

                <div class="row mt-3">
                    <div class="col-md-12">
                        {% block content %}{% endblock %}
                    </div>
                </div>

                <hr>
                <div class="row">
                    <div class="col-md-12">
                        <h5>Quick Menu</h5>
                        <div class="d-flex flex-wrap">
                            <a href="#" class="menu-item">View Transactions</a>
                            <a href="{% url 'connections' %}" class="menu-item">Database Connections</a>
                            <a href="{% url 'application_list' %}" class="menu-item">Manage Applications</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal for progress -->
    <div class="modal fade" id="progressModal" tabindex="-1" aria-labelledby="progressModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="progressModalLabel">Archival Progress</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div id="progressContent">
                        <p>Loading tables...</p>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>

    <script src="{% static 'archival/js/bootstrap.bundle.min.js' %}"></script> 
    <script>
        // CSRF token helper
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }
        const csrftoken = getCookie('csrftoken');

        // Global startProcess function (called from home.html)
        function startProcess(button, moduleId, moduleName, archivalDate) {
            $('#progressModalLabel').text('Archival Progress - ' + moduleName + ' (Date: ' + archivalDate + ')');
            $('#progressContent').html('<p>Loading tables...</p>');
            var modal = new bootstrap.Modal(document.getElementById('progressModal'));
            modal.show();

            $.getJSON('/api/get_tables/' + moduleId + '/', function(tables) {
                if (tables.length === 0) {
                    $('#progressContent').html('<p>No tables configured for this module.</p>');
                    return;
                }
                var html = '<table class="table table-sm"><thead><tr><th>Table</th><th>Status</th></tr></thead><tbody>';
                tables.forEach(function(t) {
                    html += '<tr id="table-' + t.id + '"><td>' + t.table_name + '</td><td><span class="badge bg-secondary">Pending</span></td></tr>';
                });
                html += '</tbody></table>';
                $('#progressContent').html(html);

                var index = 0;
                var totalSuccess = true;

                function runNext() {
                    if (index >= tables.length) {
                        // All scripts finished – update module date if everything succeeded
                        if (totalSuccess) {
                            $.ajax({
                                url: '/api/update_module_date/' + moduleId + '/',
                                method: 'POST',
                                headers: {'X-CSRFToken': csrftoken},
                                data: { archival_date: archivalDate },
                                success: function(response) {
                                    console.log('Module last archival date updated to ' + archivalDate);
                                    // Update the button's data-last and table cell
                                    button.setAttribute('data-last', archivalDate);
                                    $(button).closest('tr').find('td:eq(1)').text(archivalDate);
                                },
                                error: function(xhr) {
                                    console.error('Failed to update module date. Status:', xhr.status);
                                }
                            });
                        }
                        return;
                    }

                    var table = tables[index];
                    var row = $('#table-' + table.id);
                    row.find('td:last').html('<span class="badge bg-warning">Running...</span>');

                    $.ajax({
                        url: '/api/run_script/' + table.id + '/',
                        method: 'POST',
                        headers: {'X-CSRFToken': csrftoken},
                        data: { archival_date: archivalDate },
                        success: function(response) {
                            if (response.status === 'success') {
                                row.find('td:last').html('<span class="badge bg-success">Success</span>');
                            } else {
                                row.find('td:last').html('<span class="badge bg-danger">Error</span>');
                                totalSuccess = false;
                            }
                        },
                        error: function() {
                            row.find('td:last').html('<span class="badge bg-danger">Error</span>');
                            totalSuccess = false;
                        },
                        complete: function() {
                            index++;
                            runNext();
                        }
                    });
                }
                runNext();
            }).fail(function() {
                $('#progressContent').html('<p class="text-danger">Failed to load tables.</p>');
            });
        }
    </script>
</body>
</html>
