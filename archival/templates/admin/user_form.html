{% extends "archival/base.html" %}

{% block content %}
<div class="row">
    <div class="col-md-6 offset-md-3">
        <div class="card">
            <div class="card-header">
                <h4>{{ action }} User</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label>Username</label>
                        <input type="text" name="username" class="form-control" value="{{ user.username|default:'' }}" required>
                    </div>
                    <div class="mb-3">
                        <label>Password</label>
                        <input type="password" name="password" class="form-control" {% if action == 'Add' %}required{% endif %}>
                        {% if action == 'Edit' %}<small class="text-muted">Leave blank to keep unchanged.</small>{% endif %}
                    </div>
                    <div class="mb-3">
                        <label>Email</label>
                        <input type="email" name="email" class="form-control" value="{{ user.email|default:'' }}">
                    </div>
                    <div class="mb-3">
                        <label>Group</label>
                        <select name="group" class="form-select">
                            <option value="">-- None --</option>
                            {% for group in groups %}
                                <option value="{{ group.id }}" {% if user.groups.first.id == group.id %}selected{% endif %}>{{ group.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary">Save</button>
                    <a href="{% url 'user_list' %}" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
