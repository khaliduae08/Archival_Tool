{% extends "archival/base.html" %}

{% block content %}
<div class="row">
    <div class="col-md-12">
        <h2 class="h4 mb-3">Groups</h2>
        <a href="{% url 'group_add' %}" class="btn btn-success mb-3">Add New Group</a>
        <div class="table-responsive">
            <table class="table table-bordered">
                <thead>
                    <tr><th>Name</th><th>Actions</th></thead>
                <tbody>
                    {% for group in groups %}
                    <tr>
                        <td>{{ group.name }}</td>
                        <td>
                            <a href="{% url 'group_edit' group.id %}" class="btn btn-sm btn-warning">Edit</a>
                            <a href="{% url 'group_delete' group.id %}" class="btn btn-sm btn-danger" onclick="return confirm('Delete group {{ group.name }}?')">Delete</a>
                        </td>
                    </tr>
                    {% empty %}
                    <tr><td colspan="2">No groups found.</td></tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
